# Keeps dependencies patched on a public repo. Grouped, weekly, low-noise.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-dev:
        dependency-type: development
      npm-prod:
        dependency-type: production

  - package-ecosystem: cargo
    directory: "/src-tauri"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      cargo:
        patterns:
          - "*"
    ignore:
      - dependency-name: sha2
        versions:
          - ">=0.11.0, <1.0.0"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"
