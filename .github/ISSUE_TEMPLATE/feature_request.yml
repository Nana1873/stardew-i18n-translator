name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels: ["type:enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. It does not need to be a complete design; just tell
        us what would make the translation workflow better for you.

  - type: textarea
    id: idea
    attributes:
      label: What would you like to see?
      description: Describe the idea in your own words.
    validations:
      required: true

  - type: textarea
    id: benefit
    attributes:
      label: How would it help?
      description: A quick example or current workaround is useful, but optional.
