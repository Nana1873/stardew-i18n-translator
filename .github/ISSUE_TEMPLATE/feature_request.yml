name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels: ["type:enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: Have an idea? Tell us about it. A rough suggestion is completely fine.

  - type: textarea
    id: idea
    attributes:
      label: Your idea
      description: What would you like to see, and how would it help?
    validations:
      required: true
