name: Bug report
description: Report something that does not work correctly in the app.
title: "[Bug]: "
labels: ["type:bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Tell us what went wrong. A short report is fine.

        Logs and screenshots are optional. Logs may contain local folder paths,
        so remove anything private before attaching them.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the problem in your own words.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: How can it be reproduced? (optional)
      description: A few steps are enough if you know them.

  - type: textarea
    id: details
    attributes:
      label: Additional details (optional)
      description: >
        App version, Windows version, affected mod, error message, screenshots,
        or a log from Settings > About > Open logs folder.
