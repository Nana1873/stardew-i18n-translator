name: Docs check

on:
  pull_request:
    paths:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

jobs:
  docs:
    name: Markdown links and formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:docs
