# CI runs on pull requests and on the exact main commit after merge. Contributors
# still verify locally before pushing; the remote checks are the protected-branch
# safety net.
name: CI

on:
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (tsc, vitest, prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6 # version comes from package.json "packageManager"
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit
      - run: pnpm test
      - run: pnpm check:docs

  rust:
    name: Rust backend (fmt, clippy, test)
    runs-on: windows-latest # matches the development/target platform
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: cargo fmt --check
        working-directory: src-tauri
      - run: cargo clippy --locked --all-targets --profile ci -- -D warnings
        working-directory: src-tauri
      - run: cargo test --locked --profile ci
        working-directory: src-tauri
