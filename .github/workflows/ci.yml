# CI runs on pull requests and on the exact main commit after merge. Contributors
# run focused local checks before pushing; these remote checks are the complete
# protected-branch merge gate.
#
# The workflow always triggers so required status checks are always posted.
# For docs-only PRs the heavy jobs are skipped; GitHub treats skipped required
# checks as satisfied, so the PR can still be merged.
name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect code changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - id: filter
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          non_doc_files=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
            --paginate --jq '.[].filename' \
            | grep -vE '(\.md$|^docs/)' || true)
          [[ -n "$non_doc_files" ]] && echo "code=true" >> "$GITHUB_OUTPUT" || echo "code=false" >> "$GITHUB_OUTPUT"

  frontend:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    name: Frontend (tsc, vitest, prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6 # version comes from package.json "packageManager"
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit
      - run: pnpm test
      - run: pnpm check:docs

  rust:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    name: Rust backend (fmt, clippy, test)
    runs-on: windows-latest # matches the development/target platform
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: cargo fmt --check
        working-directory: src-tauri
      - run: cargo clippy --locked --all-targets --profile ci -- -D warnings
        working-directory: src-tauri
      - run: cargo test --locked --profile ci
        working-directory: src-tauri
