# Dependency vulnerability audit. Separate from CI so it can run on a schedule
# and surface advisories without gating every push. Failures are advisory:
# triage the report rather than treating a transitive advisory as a hard block.
name: Security audit

on:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "src-tauri/Cargo.toml"
      - "src-tauri/Cargo.lock"
      - ".github/workflows/audit.yml"
  pull_request:
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "src-tauri/Cargo.toml"
      - "src-tauri/Cargo.lock"
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

jobs:
  npm-audit:
    name: pnpm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --prod --audit-level high

  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      # Plain `cargo audit` fails the build on actual vulnerabilities only.
      # The "unmaintained"/"unsound" informational advisories it also reports
      # all come from Tauri's transitive Linux GTK/glib stack (and a few build
      # macros), which this Windows-only app never ships and we cannot upgrade
      # independently — so they are surfaced but do not gate CI. Pinning an
      # ignore-list here would just rot as new RUSTSEC IDs appear on the same
      # crates.
      - run: cargo audit
        working-directory: src-tauri
