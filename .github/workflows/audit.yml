# Dependency vulnerability audit. Separate from CI so it can run on a schedule
# and surface advisories without gating every push. Failures are advisory:
# triage the report rather than treating a transitive advisory as a hard block.
name: Security audit

on:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "src-tauri/Cargo.toml"
      - "src-tauri/Cargo.lock"
      - ".github/workflows/audit.yml"
  pull_request:
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "src-tauri/Cargo.toml"
      - "src-tauri/Cargo.lock"
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

jobs:
  npm-audit:
    name: pnpm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --prod --audit-level high

  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: src-tauri
