name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    name: Windows portable ZIP
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag points to the current main commit
        shell: pwsh
        run: |
          git fetch origin main:refs/remotes/origin/main
          $tagCommit = git rev-parse HEAD
          $mainCommit = git rev-parse origin/main
          if ($tagCommit -ne $mainCommit) {
            throw "Release tag must point to the current origin/main commit. Tag: $tagCommit; main: $mainCommit"
          }

      - name: Verify tag matches application version
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          if ("v$version" -ne "${{ github.ref_name }}") {
            throw "Tag ${{ github.ref_name }} does not match application version v$version."
          }

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile
      - run: pnpm check:docs

      - name: Build portable executable
        run: pnpm tauri build --no-bundle

      - name: Package portable ZIP
        id: package
        shell: pwsh
        run: |
          $zip = & ./scripts/package-portable.ps1
          "zip=$zip" >> $env:GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $generated = gh api `
            --method POST `
            "repos/${{ github.repository }}/releases/generate-notes" `
            -f tag_name="${{ github.ref_name }}" `
            -f target_commitish="${{ github.sha }}" `
            --jq .body
          $curatedNotes = "docs/release/v$version.md"
          $output = Join-Path $env:RUNNER_TEMP "release-notes.md"
          if (Test-Path -LiteralPath $curatedNotes -PathType Leaf) {
            Get-Content -Raw $curatedNotes | Set-Content -Encoding utf8 $output
            "`n---`n`n## Merged pull requests`n" | Add-Content -Encoding utf8 $output
          }
          $generated | Add-Content -Encoding utf8 $output
          "path=$output" >> $env:GITHUB_OUTPUT

      - name: Create draft release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "${{ steps.package.outputs.zip }}" `
            --draft `
            --title "Stardew i18n Translator ${{ github.ref_name }}" `
            --notes-file "${{ steps.notes.outputs.path }}"
