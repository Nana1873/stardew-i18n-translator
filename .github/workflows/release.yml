name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    name: Windows NSIS installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm test
      - run: cargo fmt --check
        working-directory: src-tauri
      - run: cargo clippy --locked --all-targets -- -D warnings
        working-directory: src-tauri
      - run: cargo test --locked
        working-directory: src-tauri

      - name: Verify tag matches application version
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          if ("v$version" -ne "${{ github.ref_name }}") {
            throw "Tag ${{ github.ref_name }} does not match application version v$version."
          }

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Stardew i18n Translator ${{ github.ref_name }}"
          releaseBody: |
            Windows installer for Stardew i18n Translator.

            This build is currently unsigned. Windows SmartScreen may display
            an unknown-publisher warning.
          releaseDraft: true
          prerelease: false
          args: --bundles nsis
